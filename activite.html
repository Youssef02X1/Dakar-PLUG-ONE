<html lang="fr">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">

</head>
<body>
<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">

    <a href="index.html" class="nav-logo"><span>Dakar</span>Activités</a>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="index.html#activites">Activités</a></li>
      <li><a href="index.html#carte">Carte</a></li>
      <li><a href="index.html#bons-plans">Bons plans</a></li>
      <li><a href="index.html#restaurants">Restaurants</a></li>
    </ul>
    <div class="nav-actions">
      <div id="navUserArea">
        <a href="auth.html" class="btn btn-outline btn-sm">Connexion</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<div class="mobile-nav" id="mobileNav">
  <a href="index.html">Accueil</a>
  <a href="index.html#activites">Activités</a>
  <a href="espace-utilisateur.html">Mon espace</a>
  <a href="auth.html" class="btn btn-primary" style="margin-top:12px">Connexion</a>
</div>

<!-- CONTENU PRINCIPAL -->
<main class="activity-detail" id="activityDetail">
  <div class="container">
    <div id="detailContent">
      <!-- Skeleton loader -->
      <div id="skeletonLoader">
        <div class="skeleton" style="height:350px;border-radius:22px;margin-bottom:32px"></div>
        <div style="display:grid;grid-template-columns:1fr 360px;gap:32px">
          <div>
            <div class="skeleton" style="height:40px;width:60%;margin-bottom:12px;border-radius:8px"></div>
            <div class="skeleton" style="height:16px;width:40%;margin-bottom:20px;border-radius:6px"></div>
            <div class="skeleton" style="height:100px;margin-bottom:16px;border-radius:8px"></div>
          </div>
          <div class="skeleton" style="height:400px;border-radius:22px"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="container">
    <div class="footer-bottom" style="border-top:none;padding-top:0">
      <span>© 2025 Dakar Activités</span>
    </div>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
// ============ DONNÉES DEMO ============
const DEMO_ACTIVITES = [
  { id:1, nom:'Sortie Kayak en mer', categorie:'kayak', zone:'Dakar', prix:15000, note:4.8, nb_avis:42, desc:"Explorez les magnifiques côtes dakaroises lors d'une sortie kayak inoubliable. Équipement complet fourni, accompagnement par un guide certifié, idéal pour débutants et confirmés. Durée : 2h. Prévoir maillot de bain et crème solaire.", image_principale:'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=800&q=80', images:['https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=400&q=80','https://images.unsplash.com/photo-1519046904884-53103b34b206?w=400&q=80','https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&q=80'], publiee:true, lat:14.7167, lng:-17.4677, adresse:'Plage de Yoff, Dakar', duree:'2h', niveau:'Débutant', capacite:8, options:[{label:'Guide privé',prix:5000},{label:'Photos souvenir',prix:3000},{label:'Transfert hôtel',prix:8000}], avis:[{auteur:'Aminata D.', note:5, date:'2025-03-12', texte:'Expérience absolument géniale ! Le guide était top, paysages magnifiques.'},{auteur:'Pierre M.', note:5, date:'2025-02-28', texte:"Parfait pour toute la famille, même nos enfants ont adoré l'aventure."},{auteur:'Fatou S.', note:4, date:'2025-02-15', texte:"Très belle balade, eau super claire. On reviendra !"}] },
  { id:2, nom:'Jet Ski Plage de Ngor', categorie:'jetski', zone:'Ngor', prix:35000, note:4.9, nb_avis:87, desc:"Sensations fortes garanties sur les eaux turquoise de Ngor. Jet ski de dernière génération, casier sécurisé, balisage de zone sécurisée. 30 minutes de pilotage libre. Moniteur sur place.", image_principale:'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=800&q=80', images:['https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=400&q=80','https://images.unsplash.com/photo-1506953823976-52e1fdc0149a?w=400&q=80','https://images.unsplash.com/photo-1519046904884-53103b34b206?w=400&q=80'], publiee:true, lat:14.7455, lng:-17.5279, adresse:'Plage de Ngor, Île de Ngor', duree:'30min', niveau:'Tout public', capacite:4, options:[{label:'30 min supplémentaires',prix:30000},{label:'Combinaison eau',prix:2000}], avis:[{auteur:'Moussa K.', note:5, date:'2025-03-20', texte:'Incroyable ! Jet ski de qualité, personnel professionnel. Je recommande à 100%.'}] },
  { id:3, nom:'Quad Lac Rose', categorie:'quad', zone:'Lac Rose', prix:25000, note:4.7, nb_avis:156, desc:"Circuit quad autour du lac Rose avec ses eaux roses uniques au monde. Paysages époustouflants, dunes de sable, traversée de villages typiques. Équipement sécurité fourni. Durée : 1h30.", image_principale:'https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=800&q=80', images:['https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=400&q=80','https://images.unsplash.com/photo-1501854140801-50d01698950b?w=400&q=80','https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&q=80'], publiee:true, lat:14.8447, lng:-17.2361, adresse:'Lac Rose, Retba', duree:'1h30', niveau:'Débutant', capacite:12, bons_plans:true, promo:15, options:[{label:'Circuit longue durée (3h)',prix:15000},{label:'Guide local',prix:3000},{label:'Photos professionnelles',prix:5000}], avis:[{auteur:'Jean-Paul T.', note:5, date:'2025-03-01', texte:"Le lac rose était magnifique ! Le guide nous a raconté l'histoire du lac, super expérience."},{auteur:'Rokhaya N.', note:4, date:'2025-02-10', texte:'Bonne activité, quad bien entretenu. Prévoir lunettes de soleil !'}] },
  { id:9, nom:'Restaurant Le Lagon', categorie:'restaurant', zone:'Dakar', prix:18000, note:4.7, nb_avis:312, desc:"Les meilleurs fruits de mer de Dakar dans un cadre exceptionnel face à l'Atlantique. Cuisine sénégalaise revisitée, bar à cocktails, terrasse panoramique. Réservation conseillée.", image_principale:'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&q=80', images:['https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=400&q=80','https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=400&q=80','https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=400&q=80'], publiee:true, lat:14.7300, lng:-17.5000, adresse:'Route de la Corniche Ouest, Dakar', duree:'2h', niveau:'Tout public', capacite:60, options:[{label:'Menu dégustation 5 plats',prix:8000},{label:'Bouteille de champagne',prix:15000}], avis:[{auteur:'Claire V.', note:5, date:'2025-03-15', texte:'Excellent ! Le thiéboudienne était parfait. Vue magnifique sur l\'océan.'},{auteur:'Omar B.', note:5, date:'2025-03-08', texte:'Service impeccable, cuisine de grande qualité. On reviendra !'}] },
];

// ============ INIT ============
function showToast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  t.setAttribute('role', 'alert');
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function getActivityId() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'), 10);
  return Number.isFinite(id) ? id : null;
}

function renderStars(note) {
  const full = Math.floor(note);
  return '★'.repeat(full) + (note % 1 >= 0.5 ? '½' : '') + '☆'.repeat(5 - Math.ceil(note));
}

function renderDetail(activite) {
  const a = activite;
  const skeleton = document.getElementById('skeletonLoader');
  skeleton.remove();

  const prixAff = a.promo ? Math.round(a.prix * (1 - a.promo/100)) : a.prix;
  const galerie = (a.images || [a.image_principale]).slice(0, 4);

  const content = document.getElementById('detailContent');

  content.innerHTML = `
    <!-- GALERIE -->
    <div class="detail-gallery" role="region" aria-label="Galerie photos">
      <div class="main-img">
        <img src="${galerie[0]}" alt="${a.nom} - photo principale" id="mainGalleryImg">
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${galerie.slice(1,3).map((img,i) => `
          <div style="flex:1;overflow:hidden;cursor:pointer" onclick="switchMainImg('${img}')">
            <img src="${img}" alt="${a.nom} - photo ${i+2}" style="width:100%;height:100%;object-fit:cover;transition:transform .3s" onmouseover="this.style.transform='scale(1.04)'" onmouseout="this.style.transform='scale(1)'">
          </div>
        `).join('')}
      </div>
    </div>

    <!-- LAYOUT PRINCIPAL -->
    <div class="detail-layout">
      <!-- INFO GAUCHE -->
      <div class="detail-info">
        <!-- Breadcrumb -->
        <nav aria-label="Fil d'ariane" style="margin-bottom:16px;font-size:.82rem;color:var(--muted)">
          <a href="index.html" style="color:var(--ocean)">Accueil</a> /
          <a href="index.html?cat=${a.categorie}" style="color:var(--ocean)">${a.categorie.charAt(0).toUpperCase()+a.categorie.slice(1)}</a> /
          <span>${a.nom}</span>
        </nav>

        <h1>${a.nom}</h1>

        <div class="detail-meta-row">
          <span class="badge badge-coral">${a.categorie}</span>
          <span class="tag">📍 ${a.zone}</span>
          ${a.duree ? `<span class="tag">⏱️ ${a.duree}</span>` : ''}
          ${a.niveau ? `<span class="tag">📊 ${a.niveau}</span>` : ''}
          ${a.capacite ? `<span class="tag">👥 Max ${a.capacite} pers.</span>` : ''}
        </div>

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
          <span class="stars" aria-label="Note ${a.note} sur 5" style="font-size:1.1rem;color:var(--gold)">
            ${renderStars(a.note)}
          </span>
          <strong style="font-size:1rem">${a.note}</strong>
          <span style="color:var(--muted);font-size:.85rem">(${a.nb_avis} avis)</span>
        </div>

        <p class="detail-desc">${a.desc}</p>

        <div class="divider"></div>

        <!-- OPTIONS -->
        ${a.options && a.options.length ? `
        <h2 style="font-size:1.1rem;margin-bottom:16px;font-weight:700">Options disponibles</h2>
        <div class="options-list" id="optionsList">
          ${a.options.map((opt, i) => `
            <label class="option-item" for="opt${i}">
              <input type="checkbox" id="opt${i}" name="option" value="${opt.prix}"
                     data-label="${opt.label}" onchange="updateWidgetPrice()">
              <span>${opt.label}</span>
              <span class="option-price">+${opt.prix.toLocaleString('fr-FR')} FCFA</span>
            </label>
          `).join('')}
        </div>
        ` : ''}

        <div class="divider"></div>

        <!-- ADRESSE -->
        <h2 style="font-size:1.1rem;margin-bottom:12px;font-weight:700">Localisation</h2>
        <p style="color:var(--muted);font-size:.9rem;margin-bottom:16px">📍 ${a.adresse || a.zone}</p>
        ${a.lat && a.lng ? `
        <div id="miniMap" style="height:200px;border-radius:14px;overflow:hidden;margin-bottom:28px" aria-label="Carte de localisation"></div>
        ` : ''}

        <!-- AVIS -->
        <div class="avis-section">
          <h2 style="font-size:1.2rem;font-weight:700;margin-bottom:4px">Avis clients</h2>
          <p style="color:var(--muted);font-size:.85rem;margin-bottom:20px">${a.nb_avis} avis vérifiés</p>
          <div class="avis-grid">
            ${(a.avis || []).map(av => `
              <div class="avis-card">
                <div class="avis-header">
                  <span class="avis-author">${av.auteur}</span>
                  <span class="avis-date">${new Date(av.date).toLocaleDateString('fr-FR')}</span>
                </div>
                <div class="stars" aria-label="Note ${av.note} sur 5" style="margin-bottom:8px">
                  ${'★'.repeat(av.note)}${'☆'.repeat(5-av.note)}
                </div>
                <p class="avis-text">${av.texte}</p>
              </div>
            `).join('')}
          </div>

          <!-- Formulaire avis -->
          <div style="margin-top:24px;background:var(--sand-lt);border-radius:14px;padding:20px">
            <h3 style="font-size:.95rem;font-weight:700;margin-bottom:14px">Laisser un avis</h3>
            <div style="display:flex;gap:8px;margin-bottom:12px" role="group" aria-label="Note">
              ${[1,2,3,4,5].map(n => `
                <button onclick="selectNote(${n},this)" class="btn btn-outline btn-sm note-btn"
                        aria-label="${n} étoile${n>1?'s':''}" data-val="${n}">${'★'.repeat(n)}</button>
              `).join('')}
            </div>
            <textarea id="avisTexte" placeholder="Partagez votre expérience…" rows="3"
                      maxlength="500" style="width:100%;margin-bottom:10px"
                      aria-label="Votre avis"></textarea>
            <button class="btn btn-secondary btn-sm" onclick="submitAvis()">Publier mon avis</button>
          </div>
        </div>
      </div>

      <!-- BOOKING WIDGET DROITE -->
      <div>
        <div class="booking-widget">
          <div class="price-big">
            ${a.promo ? `<div style="font-size:.82rem;color:var(--muted);text-decoration:line-through">${a.prix.toLocaleString('fr-FR')} FCFA</div>` : ''}
            <strong>${prixAff.toLocaleString('fr-FR')} FCFA</strong>
            <span>/personne</span>
            ${a.promo ? `<span class="badge badge-coral" style="margin-left:8px">-${a.promo}%</span>` : ''}
          </div>

          <div class="booking-form">
            <div class="field">
              <label for="bkDate">Date</label>
              <input type="date" id="bkDate" min="${new Date().toISOString().split('T')[0]}"
                     onchange="updateWidgetPrice()" aria-required="true">
            </div>
            <div class="field">
              <label for="bkPersonnes">Nombre de personnes</label>
              <select id="bkPersonnes" onchange="updateWidgetPrice()" aria-required="true">
                ${Array.from({length: Math.min(a.capacite||8, 10)}, (_,i) => `<option value="${i+1}">${i+1} personne${i>0?'s':''}</option>`).join('')}
              </select>
            </div>
          </div>

          <div class="price-breakdown" id="priceBreakdown">
            <div class="price-line">
              <span id="bkLineBase">1 × ${prixAff.toLocaleString('fr-FR')} FCFA</span>
              <span id="bkLineBaseVal">${prixAff.toLocaleString('fr-FR')} FCFA</span>
            </div>
            <div class="price-line" id="bkLineOptions" style="display:none">
              <span>Options</span>
              <span id="bkLineOptionsVal">0 FCFA</span>
            </div>
            <div class="price-total">
              <span>Total</span>
              <span id="bkTotal">${prixAff.toLocaleString('fr-FR')} FCFA</span>
            </div>
          </div>

          <button class="btn btn-primary" style="width:100%;margin-top:16px"
                  onclick="goReserver(${a.id})" id="bkBtn">
            Réserver maintenant
          </button>

          <div style="text-align:center;margin-top:10px;font-size:.78rem;color:var(--muted)">
            Paiement sécurisé Wave & Orange Money
          </div>

          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn btn-outline btn-sm" style="flex:1" onclick="toggleFavori(${a.id})">
              ♡ Sauvegarder
            </button>
            <button class="btn btn-outline btn-sm" style="flex:1" onclick="partager()">
              Partager
            </button>
          </div>
        </div>
      </div>
    </div>
  `;

  // Mise à jour titre de la page
  document.title = `${a.nom} — Dakar Activités`;

  // Stocke les données pour le booking
  window._currentActivite = a;
  window._basePrix = prixAff;

  // Mini carte
  if (a.lat && a.lng && document.getElementById('miniMap')) {
    setTimeout(() => {
      const miniMap = L.map('miniMap', { center: [a.lat, a.lng], zoom: 14, zoomControl: false, scrollWheelZoom: false });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(miniMap);
      const icon = L.divIcon({
        className: '',
        html: `<div style="width:22px;height:22px;background:var(--coral,#E8604C);border-radius:50%;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>`,
        iconSize:[22,22], iconAnchor:[11,11]
      });
      L.marker([a.lat, a.lng], { icon }).addTo(miniMap).bindPopup(a.nom).openPopup();
    }, 100);
  }
}

// Prix dynamique
function updateWidgetPrice() {
  if (!window._currentActivite) return;
  const nb = parseInt(document.getElementById('bkPersonnes')?.value || 1);
  const opts = document.querySelectorAll('#optionsList input[type=checkbox]:checked');
  let optsTotal = 0;
  opts.forEach(o => optsTotal += parseInt(o.value));

  const base = window._basePrix * nb;
  const total = base + optsTotal;

  const l = document.getElementById('bkLineBase');
  const lv = document.getElementById('bkLineBaseVal');
  const lo = document.getElementById('bkLineOptions');
  const lov = document.getElementById('bkLineOptionsVal');
  const t = document.getElementById('bkTotal');

  if (l) l.textContent = `${nb} × ${window._basePrix.toLocaleString('fr-FR')} FCFA`;
  if (lv) lv.textContent = `${base.toLocaleString('fr-FR')} FCFA`;
  if (lo) lo.style.display = optsTotal > 0 ? '' : 'none';
  if (lov) lov.textContent = `${optsTotal.toLocaleString('fr-FR')} FCFA`;
  if (t) t.textContent = `${total.toLocaleString('fr-FR')} FCFA`;
}

function goReserver(id) {
  const date = document.getElementById('bkDate')?.value;
  const nb = document.getElementById('bkPersonnes')?.value || 1;
  const opts = [...document.querySelectorAll('#optionsList input[type=checkbox]:checked')].map(o => o.dataset.label).join(',');

  if (!date) { showToast('Veuillez choisir une date', 'error'); return; }

  const params = new URLSearchParams({ id, date, nb, opts });
  window.location.href = `reservation.html?${params}`;
}

function switchMainImg(src) {
  const el = document.getElementById('mainGalleryImg');
  if (el) el.src = src;
}

let selectedNote = 0;
function selectNote(n, btn) {
  selectedNote = n;
  document.querySelectorAll('.note-btn').forEach(b => b.classList.remove('btn-secondary'));
  btn.classList.add('btn-secondary');
}

function submitAvis() {
  const txt = document.getElementById('avisTexte')?.value.trim();
  if (!selectedNote) { showToast('Choisissez une note', 'error'); return; }
  if (!txt || txt.length < 10) { showToast('Avis trop court (min. 10 caractères)', 'error'); return; }
  showToast('Merci pour votre avis ! Il sera publié après vérification.', 'success');
  document.getElementById('avisTexte').value = '';
  selectedNote = 0;
  document.querySelectorAll('.note-btn').forEach(b => b.classList.remove('btn-secondary'));
}

const favSet = new Set(JSON.parse(localStorage.getItem('da_favoris') || '[]'));
function toggleFavori(id) {
  if (favSet.has(id)) {
    favSet.delete(id);
    showToast('Retiré des favoris', 'info');
  } else {
    favSet.add(id);
    showToast('Ajouté aux favoris !', 'success');
  }
  localStorage.setItem('da_favoris', JSON.stringify([...favSet]));
}

function partager() {
  if (navigator.share) {
    navigator.share({ title: document.title, url: window.location.href });
  } else {
    navigator.clipboard?.writeText(window.location.href);
    showToast('Lien copié !', 'success');
  }
}

// Navbar scroll
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
});

// Hamburger
const hamburger = document.getElementById('hamburger');
const mobileNav = document.getElementById('mobileNav');
hamburger.addEventListener('click', () => {
  const open = mobileNav.classList.toggle('open');
  hamburger.setAttribute('aria-expanded', open);
});

// INIT
document.addEventListener('DOMContentLoaded', () => {
  const id = getActivityId();
  if (!id) {
    window.location.href = 'index.html';
    return;
  }

  // Cherche en local (démo) - en prod ce serait Supabase
  const activite = DEMO_ACTIVITES.find(a => a.id === id);
  if (!activite) {
    document.getElementById('detailContent').innerHTML = `
      <div class="empty-state" style="padding:80px 0">
        <span class="empty-icon">🔍</span>
        <h3>Activité introuvable</h3>
        <p>Cette activité n'existe pas ou n'est plus disponible.</p>
        <a href="index.html" class="btn btn-primary" style="margin-top:20px">Retour à l'accueil</a>
      </div>
    `;
    return;
  }

  renderDetail(activite);
});
</script>
</body>
</html>
